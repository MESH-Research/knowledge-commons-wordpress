# Build and push the pre-built PHP base image to ECR.
# This image contains PHP extensions, system packages, composer, and wp-cli.
# It changes rarely (only when PHP version, extensions, or OS packages change)
# so it is built separately to avoid rebuilding on every app push.

name: Build Base Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile.php'

env:
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  build-base:
    name: Build and Push Base Image
    runs-on: ubuntu-24.04-arm
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push base image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.php
          target: base
          push: true
          tags: ${{ env.ECR_REGISTRY }}/commons-wordpress-base:latest
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/commons-wordpress-base:cache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/commons-wordpress-base:cache,mode=max
